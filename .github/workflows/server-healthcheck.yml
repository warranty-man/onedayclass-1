name: Server health check

on:
  schedule:
    # UTC 기준 5분마다 (한국 시간이 아님)
    - cron: '*/50 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  ping-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        id: ping
        run: |
          if ping -c 1 -W 5 101.79.9.204; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on failure
        if: steps.ping.outputs.ok != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "서버 응답 없음: 101.79.9.204 (${{ github.run_id }})" \
            --body "ICMP ping에 실패했습니다.\n\n- IP: \`101.79.9.204\`\n- Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n- 시각(UTC): $(date -u)\n\n방화벽/ICMP 차단 여부도 함께 확인해 주세요."