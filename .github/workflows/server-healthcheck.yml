name: Server health check

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  ping-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        id: ping
        run: |
          if ping -c 1 -W 5 101.79.9.203; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=== debug: GITHUB_OUTPUT raw ==="
          cat "$GITHUB_OUTPUT"
          echo "=== debug: 바이트 덤프 (숨은 공백/개행 확인) ==="
          od -An -tx1c "$GITHUB_OUTPUT"
          echo "=== debug: 다음 스텝에서 steps.ping.outputs.ok 로 읽힘 ==="

      - name: Debug — 워크플로가 읽는 ok 값
        run: |
          echo "steps.ping.outputs.ok=[${{ steps.ping.outputs.ok }}]"
          echo "== 'true'  -> ${{ steps.ping.outputs.ok == 'true' }}"
          echo "== 'false' -> ${{ steps.ping.outputs.ok == 'false' }}"

      - name: Create issue on failure
        if: ${{ steps.ping.outputs.ok == 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "서버 응답 없음: 101.79.9.203 (${{ github.run_id }})" \
            --body "ICMP ping에 실패했습니다.\n\n- IP: \`101.79.9.203\`"