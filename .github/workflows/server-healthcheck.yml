name: Server health check

on:
  workflow_dispatch:

jobs:
  ping-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        id: ping
        run: |
          if ping -c 1 -W 5 101.79.9.204; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on failure
        if: steps.ping.outputs.ok != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "서버 응답 없음: 101.79.9.203 (${{ github.run_id }})" \
            --body "ICMP ping에 실패했습니다.\n\n- IP: \`101.79.9.203\`"